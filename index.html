<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AREISPRO - Sistema de Relatórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ios-bg: #f5f5f7; 
            --ios-accent: #007aff; 
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1d1d1f;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        /* Estilos do Modo Escuro */
        .dark { 
            --ios-bg: #000000; 
            --card-bg: rgba(28, 28, 30, 0.8); 
            --text-main: #f5f5f7;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--ios-bg);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        .welcome-dot {
            width: 28px; height: 28px; background: currentColor; border-radius: 50%;
            position: absolute; left: 50%; transform: translateX(-50%);
            top: 45px;
            animation: slideUnder 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }
        @keyframes slideUnder {
            0% { transform: translateX(-120px); opacity: 0; }
            20% { transform: translateX(-60px); opacity: 1; }
            80% { transform: translateX(60px); opacity: 1; }
            100% { transform: translateX(120px); opacity: 0; }
        }

        .hidden-view { display: none !important; }
        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--border-color); 
        }
        
        .input-ios { 
            background: rgba(120, 120, 128, 0.12); 
            border: 1.5px solid transparent; 
            transition: all 0.2s; 
            border-radius: 12px; 
            color: var(--text-main);
        }
        .input-ios:focus { background: var(--card-bg); border-color: var(--ios-accent); outline: none; }
        
        .delete-btn {
            position: absolute; top: -8px; right: -8px;
            background: #ff3b30; color: white; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid white;
            z-index: 10;
        }

        /* Botão Dark Mode Quadrado estilo Widget */
        .dark-toggle-btn {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card-bg); border: 1px solid var(--border-color);
            transition: all 0.3s;
        }
    </style>
</head>
<body>

<!-- TELA DE BEM VINDO -->
<section id="welcomeView" class="flex flex-col items-center justify-center min-h-screen">
    <div class="relative mb-32 flex flex-col items-center">
        <h1 class="text-xs font-bold uppercase tracking-[0.5em] opacity-40">AREISPRO</h1>
        <div class="welcome-dot"></div>
        <div class="mt-20 text-2xl font-light text-center transition-opacity duration-500" id="changingText">CARREGANDO...</div>
    </div>
    
    <div class="glass rounded-[32px] p-8 shadow-2xl w-[320px] flex flex-col items-center">
        <button onclick="entrarNoSistema()" class="bg-black text-white dark:bg-white dark:text-black w-full py-4 rounded-[20px] font-semibold text-base shadow-lg">
            Começar
        </button>
    </div>
</section>

<!-- APP PRINCIPAL -->
<div id="appContainer" class="hidden-view">
    <nav class="fixed top-0 w-full z-50 glass border-b">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="navigate('main')">AREIS<span class="font-light opacity-40">PRO</span></h1>
            
            <div class="flex items-center gap-3">
                <!-- BOTÃO DARK MODE QUADRADO -->
                <button onclick="toggleDarkMode()" class="dark-toggle-btn">
                    <svg id="sunIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                    <svg id="moonIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <button onclick="gerarRelatorio()" class="flex items-center gap-2 px-5 py-2.5 bg-black text-white dark:bg-white dark:text-black rounded-full text-[10px] font-bold">GERAR PDF</button>
                
                <button onclick="toggleConverter()" class="flex items-center gap-2 px-5 py-2.5 bg-blue-500/10 text-blue-600 rounded-full text-[10px] font-bold">CONVERSOR</button>
                
                <button onclick="toggleMenu()" class="w-9 h-9 rounded-full bg-gray-200 border border-gray-300 overflow-hidden shadow-sm">
                <img id="avatarPreview" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover">                
                </button>
                
                <div id="userMenu" class="hidden absolute right-4 top-16 w-52 glass rounded-2xl py-2 shadow-2xl">
                    <button onclick="navigate('config')" class="w-full text-left px-4 py-3 text-sm hover:bg-black/5">Configurações</button>
                    <button onclick="location.reload()" class="w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-red-500/10">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <main id="mainView" class="max-w-6xl mx-auto px-6 mt-24 pb-20">
        <!-- ÁREA DO CONVERSOR -->
        <div id="converterExpand" class="hidden mb-8 overflow-hidden">
            <div class="glass rounded-[32px] p-8 grid grid-cols-1 md:grid-cols-4 gap-4 border-blue-500/20">
                <div class="bg-blue-600/5 p-4 rounded-2xl text-center cursor-pointer border border-blue-500/20" onclick="triggerConverter('pdfToWordInput')">
                    <p class="text-[9px] font-black text-blue-700 mb-2 uppercase">PDF para Word</p>
                    <input id="pdfToWordInput" type="file" accept=".pdf" class="hidden" onchange="handleConversion(this, 'pdfToWord')">
                    <span class="text-xs text-blue-400">Selecionar</span>
                </div>
                <div class="bg-gray-500/5 p-4 rounded-2xl text-center opacity-60"><p class="text-[9px] font-black opacity-50 mb-2 uppercase">Word para PDF</p><span class="text-xs">Em breve</span></div>
                <div class="bg-gray-500/5 p-4 rounded-2xl text-center opacity-60"><p class="text-[9px] font-black opacity-50 mb-2 uppercase">Excel para PDF</p><span class="text-xs">Em breve</span></div>
                <div class="bg-gray-500/5 p-4 rounded-2xl text-center opacity-60"><p class="text-[9px] font-black opacity-50 mb-2 uppercase">PDF para Excel</p><span class="text-xs">Em breve</span></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="glass rounded-3xl p-6 shadow-sm">
                    <h3 class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-6">Informações</h3>
                    <div class="space-y-4">
                        <select id="prestador" class="w-full p-4 input-ios text-sm font-medium"></select>
                        <select id="lojaSelect" class="w-full p-4 input-ios text-sm font-medium"></select>
                        <input id="chamado" type="text" placeholder="Nº Chamado" class="w-full p-4 input-ios text-sm">
                        <input id="dataServico" type="date" class="w-full p-4 input-ios text-sm">
                    </div>
                </section>
                <button onclick="document.getElementById('modalLogos').classList.remove('hidden')" class="w-full py-4 bg-gray-500/10 rounded-2xl text-[10px] font-bold">CONFIGURAR LOGOS CAPA</button>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-[10px] font-bold opacity-40 uppercase mb-4">Fotos Obrigatórias</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div id="prev-fachada" class="bg-gray-500/10 border-2 border-dashed rounded-2xl p-4 text-center relative h-40 flex items-center justify-center">
                            <input type="file" onchange="handleSingleUpload(this, 'fachada')" class="absolute inset-0 opacity-0 cursor-pointer">
                            <span class="text-[10px] opacity-40 font-bold uppercase">Figura 1 – Fachada</span>
                        </div>
                        <div id="prev-marquise" class="bg-gray-500/10 border-2 border-dashed rounded-2xl p-4 text-center relative h-40 flex items-center justify-center">
                            <input type="file" onchange="handleSingleUpload(this, 'marquise')" class="absolute inset-0 opacity-0 cursor-pointer">
                            <span class="text-[10px] opacity-40 font-bold uppercase">Figura 2 – Marquise</span>
                        </div>
                    </div>
                </div>
                <div id="anexosContainer"></div>
                <button onclick="addNovoAnexo()" class="w-full py-5 border-2 border-dashed border-gray-400/30 rounded-3xl text-[11px] font-bold opacity-40 flex items-center justify-center gap-2">
                    <span class="text-lg">+</span> ADICIONAR NOVO ANEXO (FOTOS)
                </button>
            </div>
        </div>
    </main>

    <!-- VIEW CONFIGURAÇÕES -->
    <section id="configView" class="hidden-view max-w-2xl mx-auto px-6 mt-24 pb-20">
        <div class="glass rounded-3xl p-8 mb-6">
            <h3 class="text-xl font-bold mb-6">Lojas</h3>
            <div class="flex gap-2 mb-6"><input id="newStore" type="text" class="flex-1 p-3 input-ios text-sm uppercase" placeholder="Nome da Loja"><button onclick="addStore()" class="bg-black text-white px-4 rounded-xl text-sm font-bold">ADICIONAR</button></div>
            <div id="storeList" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>
        <div class="glass rounded-3xl p-8">
            <h3 class="text-xl font-bold mb-6">Fornecedores</h3>
            <div class="flex gap-2 mb-6"><input id="newProv" type="text" class="flex-1 p-3 input-ios text-sm uppercase" placeholder="Nome da Empresa"><button onclick="addProv()" class="bg-black text-white px-4 rounded-xl text-sm font-bold">ADICIONAR</button></div>
            <div id="provList" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>
        <button onclick="navigate('main')" class="mt-8 w-full py-4 bg-black text-white dark:bg-white dark:text-black rounded-2xl font-bold">Salvar e Voltar</button>
    </section>
</div>

<!-- MODAL LOGOS -->
<div id="modalLogos" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[100]">
    <div class="glass p-8 rounded-[32px] max-w-sm w-full mx-4 shadow-2xl">
        <h2 class="text-lg font-bold mb-6">Configuração de Logos</h2>
        <div class="space-y-6">
            <div><label class="text-[9px] font-black opacity-40 block mb-2 uppercase">Logo Prestador</label><input type="file" onchange="saveLogo(this, 'prestador')" class="text-xs"></div>
            <div><label class="text-[9px] font-black opacity-40 block mb-2 uppercase">Logo Cliente</label><input type="file" onchange="saveLogo(this, 'americanas')" class="text-xs"></div>
        </div>
        <button onclick="document.getElementById('modalLogos').classList.add('hidden')" class="mt-10 w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm">Salvar Alterações</button>
    </div>
</div>

<script>
// --- BANCO DE DADOS LOCAL ---
let db = {
    // Removido o localStorage para forçar a exibição do "- PA"
    lojas: [
        "#1068 – MARITUBA - PA", 
        "#368 – CASTANHEIRA - PA"
    ],
    fornecedores: [
        "THERMO ENGENHARIA SOLUÇÕES LTDA", 
        "EMC SERVIÇOS REFORMA PREDIAL E METALURGIA"
    ]
};

let anexos = [{ id: Date.now(), titulo: "ANEXO 1", obs: "", fotosAntes: [], fotosDepois: [] }];
let logos = { prestador: null, americanas: null };
let fotosObrigatorias = { fachada: null, marquise: null };

// --- DARK MODE LOGIC ---
function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('are_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}
if(localStorage.getItem('are_theme') === 'dark') document.documentElement.classList.add('dark');

// --- SISTEMA DE GESTÃO DE DADOS ---
function renderDB() {
    localStorage.setItem('are_lojas', JSON.stringify(db.lojas));
    localStorage.setItem('are_provs', JSON.stringify(db.fornecedores));
    
    document.getElementById('lojaSelect').innerHTML = db.lojas.map(l => `<option value="${l}">${l}</option>`).join('');
    document.getElementById('prestador').innerHTML = db.fornecedores.map(f => `<option value="${f}">${f}</option>`).join('');
    
    document.getElementById('storeList').innerHTML = db.lojas.map((l, i) => `<div class="flex justify-between p-3 glass rounded-xl text-xs font-medium"><span>${l}</span><button onclick="db.lojas.splice(${i},1);renderDB()" class="text-red-500 font-bold">×</button></div>`).join('');
    document.getElementById('provList').innerHTML = db.fornecedores.map((f, i) => `<div class="flex justify-between p-3 glass rounded-xl text-xs font-medium"><span>${f}</span><button onclick="db.fornecedores.splice(${i},1);renderDB()" class="text-red-500 font-bold">×</button></div>`).join('');
}

function addStore() { const v = document.getElementById('newStore').value.toUpperCase(); if(v){ db.lojas.push(v); document.getElementById('newStore').value=""; renderDB(); } }
function addProv() { const v = document.getElementById('newProv').value.toUpperCase(); if(v){ db.fornecedores.push(v); document.getElementById('newProv').value=""; renderDB(); } }

// --- LOGICA DE IMAGENS ---
async function handleSingleUpload(input, key) {
    if(input.files[0]) {
        fotosObrigatorias[key] = await comprimirImagem(input.files[0]);
        document.getElementById(`prev-${key}`).innerHTML = `<div class="delete-btn" onclick="removeObrigatoria('${key}')">×</div><img src="${fotosObrigatorias[key]}" class="w-full h-full object-cover rounded-xl">`;
    }
}

async function handleFotosAnexo(input, anexoId, tipo) {
    const anexo = anexos.find(a => a.id === anexoId);
    for (const file of Array.from(input.files)) {
        const src = await comprimirImagem(file);
        anexo[`fotos${tipo}`].push({ src, desc: "" });
    }
    renderAnexos();
}

// COMPRESSÃO PARA NÃO TRAVAR O CELULAR
function comprimirImagem(file) {
    return new Promise(r => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1200;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                r(canvas.toDataURL('image/jpeg', 0.7));
            }
        }
    });
}

function renderAnexos() {
    const cont = document.getElementById('anexosContainer');
    cont.innerHTML = "";
    anexos.forEach((anexo, idx) => {
        const div = document.createElement('div');
        div.className = "glass rounded-3xl p-6 mb-6 border-l-4 " + (idx % 2 === 0 ? "border-red-500" : "border-green-500");
        div.innerHTML = `
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black opacity-40 uppercase tracking-widest">${anexo.titulo}</h3>
                ${idx > 0 ? `<button onclick="removeAnexo(${anexo.id})" class="text-red-500 text-xs font-bold">EXCLUIR ANEXO</button>` : ''}
            </div>
            <textarea placeholder="Observação geral deste anexo..." onchange="updateAnexoObs(${anexo.id}, this.value)" class="w-full p-3 input-ios text-xs mb-4 h-16 resize-none">${anexo.obs}</textarea>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <p class="text-[9px] font-black text-red-500 uppercase mb-2">Antes</p>
                    <input type="file" multiple onchange="handleFotosAnexo(this, ${anexo.id}, 'Antes')" class="text-[10px] mb-3">
                    <div class="grid grid-cols-2 gap-2">${anexo.fotosAntes.map((f, fi) => `<div class="relative"><img src="${f.src}" class="w-full h-24 object-cover rounded-xl"><textarea onchange="updateFotoDesc(${anexo.id}, ${fi}, 'Antes', this.value)" class="w-full mt-1 p-1 text-[8px] bg-white/20 rounded h-10 border-none">${f.desc}</textarea><div class="delete-btn" onclick="removeFotoAnexo(${anexo.id}, ${fi}, 'Antes')">×</div></div>`).join('')}</div>
                </div>
                <div>
                    <p class="text-[9px] font-black text-green-500 uppercase mb-2">Depois</p>
                    <input type="file" multiple onchange="handleFotosAnexo(this, ${anexo.id}, 'Depois')" class="text-[10px] mb-3">
                    <div class="grid grid-cols-2 gap-2">${anexo.fotosDepois.map((f, fi) => `<div class="relative"><img src="${f.src}" class="w-full h-24 object-cover rounded-xl"><textarea onchange="updateFotoDesc(${anexo.id}, ${fi}, 'Depois', this.value)" class="w-full mt-1 p-1 text-[8px] bg-white/20 rounded h-10 border-none">${f.desc}</textarea><div class="delete-btn" onclick="removeFotoAnexo(${anexo.id}, ${fi}, 'Depois')">×</div></div>`).join('')}</div>
                </div>
            </div>`;
        cont.appendChild(div);
    });
}

// --- FUNÇÕES DE AUXÍLIO ---
function entrarNoSistema() { document.getElementById('welcomeView').classList.add('hidden-view'); document.getElementById('appContainer').classList.remove('hidden-view'); renderDB(); renderAnexos(); }
function navigate(v) { ['mainView', 'configView'].forEach(id => document.getElementById(id).classList.add('hidden-view')); document.getElementById(`${v}View`).classList.remove('hidden-view'); document.getElementById('userMenu').classList.add('hidden'); }
function toggleMenu() { document.getElementById('userMenu').classList.toggle('hidden'); }
function toggleConverter() { document.getElementById('converterExpand').classList.toggle('hidden'); }
function triggerConverter(id) { document.getElementById(id).click(); }
function addNovoAnexo() { anexos.push({ id: Date.now(), titulo: `ANEXO ${anexos.length + 1}`, obs: "", fotosAntes: [], fotosDepois: [] }); renderAnexos(); }
function removeAnexo(id) { if(anexos.length > 1) { anexos = anexos.filter(a => a.id !== id); renderAnexos(); } }
function updateAnexoObs(id, val) { const a = anexos.find(x => x.id === id); if(a) a.obs = val; }
function updateFotoDesc(id, fIdx, tipo, val) { const a = anexos.find(x => x.id === id); if(a) a[`fotos${tipo}`][fIdx].desc = val; }
function removeFotoAnexo(id, fIdx, tipo) { const a = anexos.find(x => x.id === id); a[`fotos${tipo}`].splice(fIdx, 1); renderAnexos(); }
function removeObrigatoria(key) { fotosObrigatorias[key] = null; document.getElementById(`prev-${key}`).innerHTML = `<input type="file" onchange="handleSingleUpload(this, '${key}')" class="absolute inset-0 opacity-0 cursor-pointer"><span class="text-[10px] opacity-40 font-bold uppercase">Figura ${key === 'fachada' ? '1' : '2'} – ${key}</span>`; }
async function saveLogo(input, key) { if(input.files[0]) logos[key] = await comprimirImagem(input.files[0]); }

// --- GERAÇÃO DE PDF ---
async function gerarRelatorio() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'cm', format: 'a4', compress: true });
    
    // Coleta de dados
    const pNome = document.getElementById('prestador').value;
    const lNome = document.getElementById('lojaSelect').value;
    const cNum = document.getElementById('chamado').value || "N/A";
    const dVal = document.getElementById('dataServico').value;
    const dFinal = dVal ? dVal.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');

    // Função de Borda Padrão
    const border = () => { 
        doc.setLineWidth(0.017); 
        doc.setDrawColor(0); 
        doc.rect(0.5, 0.5, 20, 28.7); 
    };

    // CABEÇALHO
    const header = () => {
    border();

    if(logos.prestador) {
        doc.addImage(logos.prestador, 'JPEG', 1, 0.8, 1.55, 1.41, undefined, 'FAST');
    }

    // Número da página
    const pageNumber = doc.getCurrentPageInfo().pageNumber;
    const totalPages = doc.internal.getNumberOfPages();

        doc.setDrawColor(0);
        doc.line(1, 2.4, 20, 2.4); // Linha divisória
        doc.rect(1, 2.6, 19, 1.0);  // Retângulo do topo

    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);
    doc.text(`TIPO: Relatório Fotográfico`, 1.3, 3.2);
    doc.text(`PÁGINA ${pageNumber}`, 19.5, 1.8, { align: 'right' });
    doc.text(`DATA: ${dFinal}`, 10.5, 3.2, { align: 'center' });
    doc.text(`PREPARADO POR: `, 14.8, 3.2);
    };
    
// --- 1. CAPA (Página 1) ---
header(); // Agora chamamos o cabeçalho logo no início da primeira página

doc.setFont("helvetica", "bold"); 
doc.setFontSize(16);

// Título da Capa: Desci para 5.0 para não bater no header
doc.text("RELATÓRIO FOTOGRÁFICO", 10.5, 5.0, { align: 'center' });
doc.text(pNome, 10.5, 6.2, { align: 'center' });

let yAtualCapa = 7.5; // Começa a desenhar as logos abaixo do título

// Logo 1 (Prestador)
if (logos.prestador) {
    // Tamanho grande para a capa
    doc.addImage(logos.prestador, 'PNG', 6.5, yAtualCapa, 8, 8); 
    yAtualCapa += 9;
}

// Logo 2 (Cliente)
if (logos.americanas) {
    doc.addImage(logos.americanas, 'PNG', 5.5, yAtualCapa, 10, 2.8);
    yAtualCapa += 4;
}

// Rodapé da Capa (Informações da Loja)
doc.setFontSize(14);
doc.text(`LOJA: ${lNome}`, 10.5, 23.0, { align: 'center' });
doc.text(`N° CHAMADO: ${cNum}`, 10.5, 24.2, { align: 'center' });
doc.text(`DATA: ${dFinal}`, 10.5, 25.4, { align: 'center' });

// Segunda página
if (fotosObrigatorias.fachada || fotosObrigatorias.marquise) {
    doc.addPage();
    header(); // Cabeçalho padrão do Jair Ramos

    let curY = 5.2; // Ponto inicial abaixo do cabeçalho
    const larguraTabela = 18.0;
    const alturaImagem = 8.5;
    const alturaLegenda = 1.0;
    const alturaTotalCelula = alturaImagem + alturaLegenda; // 9.5 total

    doc.setDrawColor(0);
    doc.setLineWidth(0.017);

if (fotosObrigatorias.fachada) {
    // Moldura externa
    doc.rect(1.0, curY - 0.5, 19.0, alturaTotalCelula + 0.5);

    // Imagem
    doc.addImage(fotosObrigatorias.fachada, 'JPEG', 1.5, curY, larguraTabela, alturaImagem);

    // Legenda
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text("Figura 1 – Fachada", 1.7, curY + alturaImagem + 0.7);

    // Avança para próxima célula
    curY += alturaTotalCelula;
    curY += 0.5; // ajuste o valor conforme o espaçamento desejado
}

if (fotosObrigatorias.marquise) {
    // Moldura externa
    doc.rect(1.0, curY - 0.5, 19.0, alturaTotalCelula + 0.5);

    // Imagem
    doc.addImage(fotosObrigatorias.marquise, 'JPEG', 1.5, curY, larguraTabela, alturaImagem);

    // Linha horizontal separando foto da legenda
    doc.line(1.5, curY + alturaImagem, 1.5 + larguraTabela, curY + alturaImagem);

    // Legenda
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text("Figura 2 – Marquise, Letreiro", 1.7, curY + alturaImagem + 0.7);
}
}

// --- 2. ÍNDICE (Geração Condicional) ---
if (anexos && anexos.length > 0 && anexos.some(a => a.obs && a.obs.trim() !== "")) {
    doc.addPage();
    header(); // Cabeçalho Jair Ramos

    doc.setFont("helvetica", "bold");
    doc.setFontSize(14); 
    doc.text("ÍNDICE DE ANEXOS", 10.5, 5.2, { align: 'center' });

    let idxY = 6.5;

    anexos.forEach((a, i) => {
        doc.setFontSize(9); 
        doc.setFont("helvetica", "bold"); 
        doc.text(a.titulo || "", 1.5, idxY); 
        
        doc.setFont("helvetica", "normal"); 
        let descricao = a.obs ? a.obs.substring(0, 60) : "";
        doc.text(descricao, 4.5, idxY);
        
        doc.text((i + 4).toString(), 19.5, idxY, { align: 'right' }); 
        idxY += 1.3;
    });
}

// 4. PROCESSAR ANEXOS (GALERIA)
    let fCount = 3;
    for (const anexo of anexos) {
        if(anexo.fotosAntes.length === 0 && anexo.fotosDepois.length === 0) continue;
        
        const renderGal = (photos, sub) => {
            if(photos.length === 0) return;
            doc.addPage(); 
            header();
            
            doc.setFont("helvetica", "bold"); 
            doc.setFontSize(11); 
            doc.text(sub, 10.5, 4.5, {align:'center'});
            
            let y = 5.5; 
            let col = 0;
            
            photos.forEach(f => {
                if(y > 22) { 
                    doc.addPage(); 
                    header(); 
                    y = 5.5; 
                }
                        
            const x = col === 0 ? 1.5 : 10.6;
            const larguraImg = 8.9;
            const alturaImg  = 5.0;
            const margemExtra = 0.5;
            doc.setDrawColor(0);
            doc.setLineWidth(0.017); 
// Removendo a margem extra para colar na imagem
            doc.rect(x, y, larguraImg, alturaImg + 1.8);
            doc.addImage(f.src, 'JPEG', x, y, larguraImg, alturaImg, undefined, 'FAST');
                
                doc.setFontSize(7); 
                doc.setFont("helvetica", "normal");
                doc.text(`Figura ${fCount++} - ${f.desc || 'Averiguação técnica.'}`, x + 0.2, y + alturaImg + 0.7);
                
                if(col === 1) { 
                    col = 0; 
                    y += 7.5; 
                } else { 
                    col = 1; 
                }
            });
        };
        
        renderGal(anexo.fotosAntes, "RELATÓRIO FOTOGRÁFICO - ANTES");
        renderGal(anexo.fotosDepois, "RELATÓRIO FOTOGRÁFICO - DEPOIS");
    }

    doc.save(`AREISPRO_${lNome.split(' ')[0] || 'RELATORIO'}.pdf`);
}

// ANIMAÇÃO DE TEXTO
const frases = ["GESTÃO DE NEGÓCIOS", "RELATÓRIOS TÉCNICOS", "AREISPRO", "CONVERSOR DE ARQUIVOS"];
let fIdx = 0;
setInterval(() => {
    const el = document.getElementById('changingText');
    if(el) { el.style.opacity = 0; setTimeout(() => { fIdx = (fIdx + 1) % frases.length; el.innerText = frases[fIdx]; el.style.opacity = 1; }, 500); }
}, 3000);
</script>
