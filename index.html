<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREISPRO - Sistema de Relatórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ios-bg: #f5f5f7; --ios-accent: #007aff; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--ios-bg);
            color: #1d1d1f;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animação Tela Inicial - Bolinha maior conforme solicitado */
        .welcome-dot {
            width: 28px; height: 28px; background: black; border-radius: 50%;
            position: absolute; left: 50%; transform: translateX(-50%);
            top: 45px;
            animation: slideUnder 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }
        @keyframes slideUnder {
            0% { transform: translateX(-120px); opacity: 0; }
            20% { transform: translateX(-60px); opacity: 1; }
            80% { transform: translateX(60px); opacity: 1; }
            100% { transform: translateX(120px); opacity: 0; }
        }

        .hidden-view { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .input-ios { background: rgba(0, 0, 0, 0.04); border: 1.5px solid transparent; transition: all 0.2s; border-radius: 12px; }
        .input-ios:focus { background: #fff; border-color: var(--ios-accent); outline: none; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }
        
        .shadow-ios { box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .btn-ios-main { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-ios-main:active { transform: scale(0.96); }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0); opacity: 0.5; cursor: pointer;
        }

        .delete-btn {
            position: absolute; top: -8px; right: -8px;
            background: #ff3b30; color: white; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid white;
            z-index: 10;
        }
    </style>
</head>
<body>

<!-- TELA DE BEM VINDO -->
<section id="welcomeView" class="flex flex-col items-center justify-center min-h-screen bg-[#f2f2f7]">
    <div class="relative mb-32 flex flex-col items-center">
        <h1 class="text-xs font-bold uppercase tracking-[0.5em] text-gray-400">AREISPRO</h1>
        <div class="welcome-dot"></div>
        <div class="mt-20 text-2xl font-light text-center transition-opacity duration-500" id="changingText">
            CARREGANDO...
        </div>
    </div>
    
    <div class="glass rounded-[32px] p-8 shadow-ios w-[320px] flex flex-col items-center">
        <button onclick="entrarNoSistema()" class="btn-ios-main bg-black text-white w-full py-4 rounded-[20px] font-semibold text-base shadow-lg shadow-black/20">
            Começar
        </button>
    </div>
</section>

<!-- APP PRINCIPAL -->
<div id="appContainer" class="hidden-view">
    <nav class="fixed top-0 w-full z-50 glass border-b border-gray-200/50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="navigate('main')">AREIS<span class="font-light text-gray-400">PRO</span></h1>
            
            <div class="flex items-center gap-3">
                <button onclick="gerarRelatorio()" class="flex items-center gap-2 px-5 py-2.5 bg-black text-white rounded-full text-[10px] font-bold hover:opacity-80 transition">
                    <span>GERAR PDF</span>
                </button>
                <button onclick="toggleConverter()" class="flex items-center gap-2 px-5 py-2.5 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold">
                    <span>CONVERSOR</span>
                </button>
                <button onclick="toggleMenu()" class="w-9 h-9 rounded-full bg-gray-200 border border-gray-300 overflow-hidden shadow-sm">
                    <img id="avatarPreview" src="https://ui-avatars.com/api/?name=Jair+Ramos&background=000&color=fff" class="w-full h-full">
                </button>
                
                <div id="userMenu" class="hidden absolute right-4 top-16 w-52 glass rounded-2xl py-2 shadow-2xl border border-gray-100">
                    <button onclick="navigate('config')" class="w-full text-left px-4 py-3 text-sm hover:bg-white/50">Configurações</button>
                    <button onclick="location.reload()" class="w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-red-50">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <main id="mainView" class="max-w-6xl mx-auto px-6 mt-24 pb-20">
        <!-- ÁREA DO CONVERSOR -->
        <div id="converterExpand" class="hidden mb-8 overflow-hidden transition-all duration-500">
            <div class="glass rounded-[32px] p-8 grid grid-cols-1 md:grid-cols-4 gap-4 border border-blue-100">
                <div class="bg-blue-600/5 p-4 rounded-2xl text-center cursor-pointer border border-blue-200" onclick="triggerConverter('pdfToWordInput')">
                    <p class="text-[9px] font-black text-blue-700 mb-2 uppercase">PDF para Word</p>
                    <input id="pdfToWordInput" type="file" accept=".pdf" class="hidden" onchange="handleConversion(this, 'pdfToWord')">
                    <span class="text-xs text-blue-400">Selecionar</span>
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl text-center opacity-60"><p class="text-[9px] font-black text-gray-500 mb-2 uppercase">Word para PDF</p><span class="text-xs">Em breve</span></div>
                <div class="bg-gray-50 p-4 rounded-2xl text-center opacity-60"><p class="text-[9px] font-black text-gray-500 mb-2 uppercase">Excel para PDF</p><span class="text-xs">Em breve</span></div>
                <div class="bg-gray-50 p-4 rounded-2xl text-center opacity-60"><p class="text-[9px] font-black text-gray-500 mb-2 uppercase">PDF para Excel</p><span class="text-xs">Em breve</span></div>
            </div>
            <div id="procUI" class="hidden mt-4 glass p-4 rounded-2xl text-center max-w-xs mx-auto">
                <div class="w-full bg-gray-200 h-1 rounded-full overflow-hidden"><div id="cBar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div></div>
                <p id="sMsg" class="text-[9px] font-bold mt-2 text-blue-600 uppercase">Processando...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="glass rounded-3xl p-6 shadow-sm">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6">Informações</h3>
                    <div class="space-y-4">
                        <select id="prestador" class="w-full p-4 input-ios text-sm font-medium"></select>
                        <select id="lojaSelect" class="w-full p-4 input-ios text-sm font-medium"></select>
                        <input id="chamado" type="text" placeholder="Nº Chamado" class="w-full p-4 input-ios text-sm">
                        <div class="relative">
                            <input id="dataServico" type="date" class="w-full p-4 input-ios text-sm pl-10">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-lg">🗓️</span>
                        </div>
                    </div>
                </section>
                <button onclick="document.getElementById('modalLogos').classList.remove('hidden')" class="w-full py-4 bg-gray-100 rounded-2xl text-[10px] font-bold active:bg-gray-200 transition">CONFIGURAR LOGOS CAPA</button>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4">Fotos Obrigatórias</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div id="prev-fachada" class="bg-gray-50 border-2 border-dashed rounded-2xl p-4 text-center relative h-40 flex items-center justify-center">
                            <input type="file" onchange="handleSingleUpload(this, 'fachada')" class="absolute inset-0 opacity-0 cursor-pointer">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Figura 1 – Fachada</span>
                        </div>
                        <div id="prev-marquise" class="bg-gray-50 border-2 border-dashed rounded-2xl p-4 text-center relative h-40 flex items-center justify-center">
                            <input type="file" onchange="handleSingleUpload(this, 'marquise')" class="absolute inset-0 opacity-0 cursor-pointer">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Figura 2 – Marquise</span>
                        </div>
                    </div>
                </div>

                <div id="anexosContainer"></div>
                
                <button onclick="addNovoAnexo()" class="w-full py-5 border-2 border-dashed border-gray-300 rounded-3xl text-[11px] font-bold text-gray-400 hover:bg-white transition flex items-center justify-center gap-2">
                    <span class="text-lg">+</span> ADICIONAR NOVO ANEXO (FOTOS)
                </button>
            </div>
        </div>
    </main>

    <section id="configView" class="hidden-view max-w-2xl mx-auto px-6 mt-24">
        <div class="glass rounded-3xl p-8 mb-6">
            <h3 class="text-xl font-bold mb-6">Lojas</h3>
            <div class="flex gap-2 mb-6"><input id="newStore" type="text" class="flex-1 p-3 input-ios text-sm uppercase"><button onclick="addStore()" class="bg-black text-white px-4 rounded-xl text-sm font-bold">Add</button></div>
            <div id="storeList" class="space-y-2"></div>
        </div>
        <div class="glass rounded-3xl p-8">
            <h3 class="text-xl font-bold mb-6">Fornecedores</h3>
            <div class="flex gap-2 mb-6"><input id="newProv" type="text" class="flex-1 p-3 input-ios text-sm uppercase"><button onclick="addProv()" class="bg-black text-white px-4 rounded-xl text-sm font-bold">Add</button></div>
            <div id="provList" class="space-y-2"></div>
        </div>
    </section>
</div>

<div id="modalLogos" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[100]">
    <div class="glass p-8 rounded-[32px] max-w-sm w-full mx-4 shadow-2xl">
        <h2 class="text-lg font-bold mb-6">Configuração de Logos</h2>
        <div class="space-y-6">
            <div><label class="text-[9px] font-black text-gray-400 block mb-2 uppercase">Logo Prestador</label><input type="file" onchange="saveLogo(this, 'prestador')" class="text-xs"></div>
            <div><label class="text-[9px] font-black text-gray-400 block mb-2 uppercase">Logo Cliente</label><input type="file" onchange="saveLogo(this, 'americanas')" class="text-xs"></div>
        </div>
        <button onclick="document.getElementById('modalLogos').classList.add('hidden')" class="mt-10 w-full bg-black text-white py-4 rounded-2xl font-bold text-sm">Salvar Alterações</button>
    </div>
</div>

<script>
let db = {
    lojas: JSON.parse(localStorage.getItem('are_lojas')) || ["1068 – MARITUBA", "368 – CASTANHEIRA"],
    fornecedores: JSON.parse(localStorage.getItem('are_provs')) || ["THERMO ENGENHARIA", "EMC SERVIÇOS"]
};
let anexos = [
    { id: Date.now(), titulo: "ANEXO 1", obs: "", fotosAntes: [], fotosDepois: [] }
];
let logos = { prestador: null, americanas: null };
let fotosObrigatorias = { fachada: null, marquise: null };

function entrarNoSistema() {
    document.getElementById('welcomeView').classList.add('hidden-view');
    document.getElementById('appContainer').classList.remove('hidden-view');
    renderDB();
    renderAnexos();
}

function renderDB() {
    localStorage.setItem('are_lojas', JSON.stringify(db.lojas));
    localStorage.setItem('are_provs', JSON.stringify(db.fornecedores));
    document.getElementById('lojaSelect').innerHTML = db.lojas.map(l => `<option value="${l}">${l}</option>`).join('');
    document.getElementById('prestador').innerHTML = db.fornecedores.map(f => `<option value="${f}">${f}</option>`).join('');
    document.getElementById('storeList').innerHTML = db.lojas.map((l, i) => `<div class="flex justify-between p-3 bg-black/5 rounded-xl text-xs font-medium"><span>${l}</span><button onclick="db.lojas.splice(${i},1);renderDB()" class="text-red-500">×</button></div>`).join('');
    document.getElementById('provList').innerHTML = db.fornecedores.map((f, i) => `<div class="flex justify-between p-3 bg-black/5 rounded-xl text-xs font-medium"><span>${f}</span><button onclick="db.fornecedores.splice(${i},1);renderDB()" class="text-red-500">×</button></div>`).join('');
}

function addStore() { const v = document.getElementById('newStore').value.toUpperCase(); if(v){ db.lojas.push(v); document.getElementById('newStore').value=""; renderDB(); } }
function addProv() { const v = document.getElementById('newProv').value.toUpperCase(); if(v){ db.fornecedores.push(v); document.getElementById('newProv').value=""; renderDB(); } }

function addNovoAnexo() {
    anexos.push({ id: Date.now(), titulo: `ANEXO ${anexos.length + 1}`, obs: "", fotosAntes: [], fotosDepois: [] });
    renderAnexos();
}

function removeAnexo(id) {
    if(anexos.length === 1) return;
    anexos = anexos.filter(a => a.id !== id);
    anexos.forEach((a, i) => a.titulo = `ANEXO ${i + 1}`);
    renderAnexos();
}

function renderAnexos() {
    const cont = document.getElementById('anexosContainer');
    cont.innerHTML = "";
    anexos.forEach((anexo, idx) => {
        const div = document.createElement('div');
        div.className = "glass rounded-3xl p-6 mb-6 relative border-l-4 " + (idx % 2 === 0 ? "border-red-500" : "border-green-500");
        div.innerHTML = `
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${anexo.titulo}</h3>
                ${idx > 0 ? `<button onclick="removeAnexo(${anexo.id})" class="text-red-500 text-xs font-bold">EXCLUIR ANEXO</button>` : ''}
            </div>
            <textarea placeholder="Observação geral deste anexo..." onchange="updateAnexoObs(${anexo.id}, this.value)" class="w-full p-3 input-ios text-xs mb-4 h-16 resize-none">${anexo.obs}</textarea>
            
            <!-- ANTES -->
            <div class="mb-6">
                <p class="text-[9px] font-black text-red-500 uppercase mb-2">Relatório Fotográfico - Antes</p>
                <input type="file" multiple onchange="handleFotosAnexo(this, ${anexo.id}, 'Antes')" class="text-[10px] mb-3 cursor-pointer">
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    ${anexo.fotosAntes.map((f, fIdx) => `
                        <div class="relative">
                            <div class="delete-btn" onclick="removeFotoAnexo(${anexo.id}, ${fIdx}, 'Antes')">×</div>
                            <img src="${f.src}" class="w-full h-24 object-cover rounded-xl shadow-sm">
                            <textarea placeholder="Descrição..." onchange="updateFotoDesc(${anexo.id}, ${fIdx}, 'Antes', this.value)" class="w-full mt-1 p-1 text-[9px] bg-white/50 rounded-lg h-10 border-none resize-none">${f.desc}</textarea>
                        </div>
                    `).join('')}
                </div>
            </div>

            <!-- DEPOIS -->
            <div>
                <p class="text-[9px] font-black text-green-500 uppercase mb-2">Relatório Fotográfico - Depois</p>
                <input type="file" multiple onchange="handleFotosAnexo(this, ${anexo.id}, 'Depois')" class="text-[10px] mb-3 cursor-pointer">
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    ${anexo.fotosDepois.map((f, fIdx) => `
                        <div class="relative">
                            <div class="delete-btn" onclick="removeFotoAnexo(${anexo.id}, ${fIdx}, 'Depois')">×</div>
                            <img src="${f.src}" class="w-full h-24 object-cover rounded-xl shadow-sm">
                            <textarea placeholder="Descrição..." onchange="updateFotoDesc(${anexo.id}, ${fIdx}, 'Depois', this.value)" class="w-full mt-1 p-1 text-[9px] bg-white/50 rounded-lg h-10 border-none resize-none">${f.desc}</textarea>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        cont.appendChild(div);
    });
}

function updateAnexoObs(id, val) { const a = anexos.find(x => x.id === id); if(a) a.obs = val; }
function updateFotoDesc(id, fIdx, tipo, val) { 
    const a = anexos.find(x => x.id === id); 
    if(a) a[`fotos${tipo}`][fIdx].desc = val; 
}

async function handleFotosAnexo(input, anexoId, tipo) {
    const anexo = anexos.find(a => a.id === anexoId);
    for (const file of Array.from(input.files)) {
        const src = await new Promise(r => { const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(file); });
        anexo[`fotos${tipo}`].push({ src, desc: "" });
    }
    renderAnexos();
}

function removeFotoAnexo(id, fIdx, tipo) {
    const a = anexos.find(x => x.id === id);
    if(a) { a[`fotos${tipo}`].splice(fIdx, 1); renderAnexos(); }
}

async function handleSingleUpload(input, key) {
    if(input.files[0]) {
        fotosObrigatorias[key] = await new Promise(r => { const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(input.files[0]); });
        document.getElementById(`prev-${key}`).innerHTML = `
            <div class="delete-btn" onclick="removeObrigatoria('${key}')">×</div>
            <img src="${fotosObrigatorias[key]}" class="w-full h-full object-cover rounded-xl">`;
    }
}

function removeObrigatoria(key) {
    fotosObrigatorias[key] = null;
    document.getElementById(`prev-${key}`).innerHTML = `<input type="file" onchange="handleSingleUpload(this, '${key}')" class="absolute inset-0 opacity-0 cursor-pointer"><span class="text-[10px] text-gray-400 font-bold uppercase">Figura ${key === 'fachada' ? '1' : '2'} – ${key}</span>`;
}

async function saveLogo(input, key) {
    if(input.files[0]) logos[key] = await new Promise(r => { const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(input.files[0]); });
}

function navigate(v) {
    ['mainView', 'configView'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
    document.getElementById(`${v}View`).classList.remove('hidden-view');
    document.getElementById('userMenu').classList.add('hidden');
}

function toggleMenu() { document.getElementById('userMenu').classList.toggle('hidden'); }
function toggleConverter() { document.getElementById('converterExpand').classList.toggle('hidden'); }
function triggerConverter(id) { document.getElementById(id).click(); }

async function handleConversion(input, mode) {
    const file = input.files[0]; if(!file) return;
    const proc = document.getElementById('procUI');
    const bar = document.getElementById('cBar');
    const msg = document.getElementById('sMsg');
    proc.classList.remove('hidden'); bar.style.width = "20%"; msg.innerText = "Lendo...";
    try {
        if(mode === 'pdfToWord') {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let fullText = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(it => it.str).join(' ') + "\n\n";
                bar.style.width = (20 + (i/pdf.numPages)*60) + "%";
            }
            const docContent = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset="utf-8"></head><body style="font-family: Arial;">${fullText.replace(/\n/g, '<br>')}</body></html>`;
            const blob = new Blob([docContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = file.name.replace('.pdf', '_ED.doc'); a.click();
        }
        bar.style.width = "100%"; msg.innerText = "OK!";
        setTimeout(() => proc.classList.add('hidden'), 2000);
    } catch(e) { msg.innerText = "Erro"; }
}

async function gerarRelatorio() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'cm', format: 'a4' });
    const pNome = document.getElementById('prestador').value;
    const lNome = document.getElementById('lojaSelect').value;
    const cNum = document.getElementById('chamado').value || "N/A";
    const dVal = document.getElementById('dataServico').value;
    const dFinal = dVal ? dVal.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR');

    const border = () => { doc.setLineWidth(0.017); doc.setDrawColor(0); doc.rect(0.5, 0.5, 20, 28.7); };
    
    // CAPA
        // --- CAPA COM TEXTO NO TOPO ---
        border();

        // 1. TEXTOS NO TOPO (Antes das Logos)
        doc.setFont("helvetica", "bold"); 
        doc.setFontSize(16);
        doc.text("RELATÓRIO FOTOGRÁFICO", 10.5, 2.5, { align: 'center' });
        doc.text(pNome, 10.5, 3.8, { align: 'center' }); // pNome é o Prestador/Empresa
        // 2. LOGOS (Empurradas para baixo para dar espaço ao texto)
        // Ajustei o Y das logos para começarem em 5cm
        if(logos.prestador) doc.addImage(logos.prestador, 'JPEG', 1, 6.0, 9, 10);
        if(logos.americanas) doc.addImage(logos.americanas, 'JPEG', 8.5, 6.0, 11.28, 2.83);
        // 3. DEMAIS INFORMAÇÕES (Mantidas no meio/baixo da página)
        doc.text(`LOJA: ${lNome}`, 10.5, 22.0, { align: 'center' });
        doc.text(`N° CHAMADO: ${cNum}`, 10.5, 23.2, { align: 'center' });
        doc.text(`DATA: ${dFinal}`, 10.5, 24.4, { align: 'center' });

    // ÍNDICE (Com descrição conforme solicitado)
    doc.addPage(); border();
    doc.setFontSize(14); doc.text("ÍNDICE DE ANEXOS", 10.5, 2.5, { align: 'center' });
    let idxY = 4.5;
    anexos.forEach((a, i) => {
        doc.setFontSize(9);
        doc.setFont("helvetica", "bold");
        doc.text(a.titulo, 1.5, idxY);
        
        doc.setFont("helvetica", "normal");
        const obsTrim = a.obs ? ` - ${a.obs.substring(0, 50)}${a.obs.length > 50 ? '...' : ''}` : "";
        doc.text(obsTrim, 3.5, idxY);

        const dotStr = ".".repeat(100);
        doc.text(dotStr, 11, idxY);
        doc.text((i + 3).toString(), 19.5, idxY);
        idxY += 1;
    });

    const header = () => {
        border();
        if(logos.prestador) doc.addImage(logos.prestador, 'JPEG', 1, 0.8, 1.55, 1.41);
        doc.line(1, 2.4, 20, 2.4); doc.rect(1, 2.6, 19, 1.0);
        doc.setFontSize(9); doc.text(`TIPO: Relatório Fotográfico`, 1.3, 3.2);
        doc.text(`DATA: ${dFinal}`, 10.5, 3.2, { align: 'center' });
